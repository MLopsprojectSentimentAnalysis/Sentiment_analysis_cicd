name: MLOps CI with Conditional Logic

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      training: ${{ steps.filter.outputs.training }}
      data: ${{ steps.filter.outputs.data }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            training:
              - 'src/training/**'
              - 'src/models/**'
              - 'configs/**'
            data:
              - 'data/**'
              - 'src/data_loaders/**'
            backend:
              - 'src/api/**'
              - 'src/inference/**'
              - 'Dockerfile'
              - 'docker/requirements-backend.txt'
            frontend:
              - 'dashboards/**'
              - 'docker/Dockerfile.frontend'
              - 'docker/requirements-frontend.txt'
            docs:
              - '**.md'
              - 'docs/**'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install flake8 black
      - run: flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
      - run: black --check src/ || echo "Style warnings (non-blocking)"
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      - run: pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term
        env:
          PYTHONPATH: .

  training-smoke-test:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: needs.changes.outputs.training == 'true' || needs.changes.outputs.data == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          pip install transformers datasets torch --extra-index-url https://download.pytorch.org/whl/cpu
      - name: REAL training dry-run (100 samples, CPU, ~3 min)
        run: python src/ci_training_smoke_test.py
      - name: Training pipeline validated
        run: echo "::notice::Training pipeline automation verified. Full training runs on DGX with 25k samples."

  docker-build-backend:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.training == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          load: true
          tags: sentiment-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-frontend:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.frontend
          push: false
          load: true
          tags: sentiment-dashboard:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    runs-on: ubuntu-latest
    needs: [changes, lint, test, training-smoke-test, docker-build-backend, docker-build-frontend]
    if: always()
    steps:
      - run: |
          echo "========================================"
          echo "MLOps Conditional CI Summary"
          echo "========================================"
          echo "Training changed: ${{ needs.changes.outputs.training }}"
          echo "Data changed:     ${{ needs.changes.outputs.data }}"
          echo "Backend changed:  ${{ needs.changes.outputs.backend }}"
          echo "Frontend changed: ${{ needs.changes.outputs.frontend }}"
          echo "----------------------------------------"
          if [ "${{ needs.changes.outputs.training }}" = "true" ] || [ "${{ needs.changes.outputs.data }}" = "true" ]; then
            echo "PATH A: training/data -> retrain + backend rebuild"
          elif [ "${{ needs.changes.outputs.backend }}" = "true" ]; then
            echo "PATH B: backend only -> skip training"
          elif [ "${{ needs.changes.outputs.frontend }}" = "true" ]; then
            echo "PATH C: frontend only -> skip training + backend"
          else
            echo "PATH D: docs only -> skip all builds"
          fi