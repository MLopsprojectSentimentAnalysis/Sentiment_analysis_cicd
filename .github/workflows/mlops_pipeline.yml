name: MLOps CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ========== LINT ==========
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install linters
        run: pip install flake8 black
      - name: Check critical errors
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Check formatting (non-blocking)
        run: |
          black --check src/ || echo "Formatting suggestions exist"
        continue-on-error: true

  # ========== TEST ==========
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term
        env:
          PYTHONPATH: .
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
        if: always()

  # ========== DOCKER BUILD (FRONTEND ONLY) ==========
  # Backend image requires fine-tuned model weights (260 MB).
  # Model weights are intentionally excluded from Git (MLOps best practice).
  # Backend is built by Google Cloud Build during gcloud run deploy --source .
  docker-build-frontend:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.frontend
          push: false
          tags: sentiment-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Report image size
        run: docker images | grep sentiment-dashboard || true

  # ========== VALIDATE BACKEND DOCKERFILE (SYNTAX ONLY) ==========
  # Uses hadolint to statically verify backend Dockerfile without building
  validate-backend-dockerfile:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Lint backend Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error
          ignore: DL3008,DL3013,DL3042

  # ========== SUMMARY ==========
  summary:
    runs-on: ubuntu-latest
    needs: [lint, test, docker-build-frontend, validate-backend-dockerfile]
    if: always()
    steps:
      - name: CI Summary
        run: |
          echo "=========================================="
          echo "MLOps CI Pipeline Complete"
          echo "=========================================="
          echo "Lint:                        ${{ needs.lint.result }}"
          echo "Tests:                       ${{ needs.test.result }}"
          echo "Frontend Docker build:       ${{ needs.docker-build-frontend.result }}"
          echo "Backend Dockerfile validate: ${{ needs.validate-backend-dockerfile.result }}"
          echo "=========================================="
          echo ""
          echo "Deployment:"
          echo "  Backend:  Cloud Run 'sentiment-api' (deployed via Cloud Build)"
          echo "  Frontend: Cloud Run 'sentiment-dashboard'"
          echo ""
          echo "Note: Fine-tuned model weights are stored in MLflow Registry,"
          echo "not in Git (MLOps best practice). Backend image is built by"
          echo "Google Cloud Build with direct access to the model files on"
          echo "the training server, not by GitHub Actions."