name: MLOps CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ========== LINT ==========
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install linters
        run: pip install flake8 black
      - name: Check code style (non-blocking)
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check src/ || echo "Formatting suggestions exist (non-blocking)"
        continue-on-error: true

  # ========== TEST ==========
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term
        env:
          PYTHONPATH: .

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
        if: always()

  # ========== BUILD DOCKER IMAGE ==========
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: sentiment-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.frontend
          push: false
          tags: sentiment-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report image sizes
        run: |
          docker images sentiment-api sentiment-dashboard

  # ========== SUMMARY ==========
  summary:
    runs-on: ubuntu-latest
    needs: [lint, test, docker-build]
    if: always()
    steps:
      - name: CI Summary
        run: |
          echo "=========================================="
          echo "MLOps CI Pipeline Complete"
          echo "=========================================="
          echo "Lint:         ${{ needs.lint.result }}"
          echo "Tests:        ${{ needs.test.result }}"
          echo "Docker build: ${{ needs.docker-build.result }}"
          echo "=========================================="
          echo "Note: Cloud Run deployment is handled"
          echo "manually via gcloud run deploy --source ."