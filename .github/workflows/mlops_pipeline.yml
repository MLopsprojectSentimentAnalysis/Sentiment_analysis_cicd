name: MLOps CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install linters
        run: pip install flake8 black
      - name: Check critical errors
        run: flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Check formatting (non-blocking)
        run: black --check src/ || echo "Formatting suggestions exist"
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      - name: Run unit tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term
        env:
          PYTHONPATH: .
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
        if: always()

  docker-build-frontend:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.frontend
          push: false
          load: true
          tags: sentiment-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-backend:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Create reference data
        run: |
          pip install pandas pyarrow
          mkdir -p data/processed
          python -c "
          import pandas as pd
          pd.DataFrame({
              'text': [f'Sample review {i}' for i in range(100)],
              'label': [i % 2 for i in range(100)],
              'text_length': [30 + (i % 50) for i in range(100)],
              'word_count': [5 + (i % 10) for i in range(100)],
          }).to_parquet('data/processed/reference.parquet')
          print('Created reference.parquet')
          "
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend Docker image (HF model fetched during build)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: sentiment-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            HF_MODEL_REPO=Jahanvi16/sentimentAnalysisDistilBERT

  summary:
    runs-on: ubuntu-latest
    needs: [lint, test, docker-build-frontend, docker-build-backend]
    if: always()
    steps:
      - name: CI Summary
        run: |
          echo "========================================"
          echo "MLOps CI Pipeline Complete"
          echo "========================================"
          echo "Lint:              ${{ needs.lint.result }}"
          echo "Tests:             ${{ needs.test.result }}"
          echo "Frontend image:    ${{ needs.docker-build-frontend.result }}"
          echo "Backend image:     ${{ needs.docker-build-backend.result }}"
          echo "========================================"
          echo "Model: Jahanvi16/sentimentAnalysisDistilBERT"
          echo "Backend Cloud Run: https://sentiment-api-565865319827.asia-south1.run.app"
          echo "Frontend Cloud Run: https://sentiment-dashboard-565865319827.asia-south1.run.app"